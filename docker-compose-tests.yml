include:
  - path:
      - docker-compose.yml     # depend on the main docker-compose file

services:
  # *****
  # Tests
  # *****
  # Frontend Tests
  frontendTests:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-frontend-tests
    container_name: frontend-tests
    build:
      context: ./
      dockerfile: ./src/frontend/Dockerfile.cypress
    volumes:
      - ./src/frontend/cypress/videos:/app/cypress/videos
      - ./src/frontend/cypress/screenshots:/app/cypress/screenshots
    environment:
      - CYPRESS_baseUrl=http://${FRONTEND_ADDR}
      - FRONTEND_ADDR
      - NODE_ENV=production
    depends_on:
      - frontend

  # Trace-based Tests
  traceBasedTests:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-traceBasedTests
    container_name: traceBasedTests
    build:
      context: ./
      dockerfile: ./test/demo-test/Dockerfile
    environment:
      - FRONTEND_ADDR
      - SHIPPING_ADDR
      - EMAIL_ADDR
      - JAEGER_URL=http://jaeger:16686/api
      - SERVICES_TO_TEST
    depends_on:
      accounting:
        condition: service_started
      ad:
        condition: service_started
      cart:
        condition: service_started
      checkout:
        condition: service_started
      currency:
        condition: service_started
      email:
        condition: service_started
      fraud-detection:
        condition: service_started
      frontend:
        condition: service_started
      llm:
        condition: service_started
      payment:
        condition: service_started
      product-catalog:
        condition: service_started
      product-reviews:
        condition: service_started
      quote:
        condition: service_started
      recommendation:
        condition: service_started
      shipping:
        condition: service_started
      flagd:
        condition: service_started
      kafka:
        condition: service_started
      jaeger:
        condition: service_started
