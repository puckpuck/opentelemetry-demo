name: "Frontend: Get product recommendations"
description: "Simulate a user seeing product recommendations and verify the RecommendationService span"

trigger:
  type: http
  method: GET
  url: "http://${FRONTEND_ADDR}/api/recommendations?productIds=0PUK6V6EV0,1YMWWN1N4O,2ZYFJ3GM2N,66VCHSJNUP,6E92ZMYYFZ&userId=2491f868-88f1-4345-8836-d5d8511a9f83"
  expected_status: 200

jaeger_query:
  service: "frontend"
  lookback_seconds: 30
  poll_interval_seconds: 3
  poll_max_attempts: 20

assertions:
  - name: "RecommendationService was called"
    operation: "oteldemo.RecommendationService/ListRecommendations"
    min_spans: 1
