name: "Frontend: Add product to cart"
description: "Simulate a user adding a product to the shopping cart"

trigger:
  type: http
  method: POST
  url: "http://${FRONTEND_ADDR}/api/cart"
  headers:
    Content-Type: application/json
  body:
    item:
      productId: "0PUK6V6EV0"
      quantity: 2
    userId: "2491f868-88f1-4345-8836-d5d8511a9f83"
  expected_status: 200

jaeger_query:
  service: "frontend"
  lookback_seconds: 30
  poll_interval_seconds: 3
  poll_max_attempts: 20

assertions:
  - name: "Cart item was added"
    operation: "oteldemo.CartService/AddItem"
    min_spans: 1
    span_attributes:
      app.product.id: "0PUK6V6EV0"

  - name: "Cart was persisted to Redis"
    operation: "HMSET"
    min_spans: 1
    span_attributes:
      db.system: "redis"
